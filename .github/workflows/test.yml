name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  skill:
    name: Agent Skill package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Validate Agent Skills specification
        run: uvx --from skills-ref==0.1.1 agentskills validate "${{ github.workspace }}/skills/animated-sticker-maker"
      - name: Verify skills CLI discovery and isolated install
        env:
          CI: "true"
          NO_COLOR: "1"
        run: |
          listing=$(npx --yes skills@1.5.17 add "${{ github.workspace }}" --list)
          printf '%s\n' "$listing"
          printf '%s\n' "$listing" | grep -Fq "Found 1 skill"
          printf '%s\n' "$listing" | grep -q "animated-sticker-maker"
          isolated_home=$(mktemp -d)
          HOME="$isolated_home" npx --yes skills@1.5.17 add "${{ github.workspace }}" -g -y --agent codex --copy
          installed="$isolated_home/.agents/skills/animated-sticker-maker"
          test -f "$installed/SKILL.md"
          test -f "$installed/references/validation.md"
          test -f "$installed/scripts/package_sticker.py"
          diff -u skills/animated-sticker-maker/SKILL.md "$installed/SKILL.md"

  python:
    name: Python ${{ matrix.python }} / Pillow ${{ matrix.pillow }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            pillow: "Pillow>=10,<11"
          - python: "3.11"
            pillow: "Pillow>=11,<12"
          - python: "3.12"
            pillow: "Pillow>=12,<13"
          - python: "3.13"
            pillow: "Pillow>=12,<13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: skills/animated-sticker-maker/requirements.txt
      - name: Install dependencies
        run: python -m pip install "${{ matrix.pillow }}" "numpy>=1.24"
      - name: Compile scripts
        run: python -m py_compile skills/animated-sticker-maker/scripts/*.py
      - name: Run tests
        run: python -m unittest discover -s skills/animated-sticker-maker/tests -v
