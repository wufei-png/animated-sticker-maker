name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  skill:
    name: Agent Skill package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Validate Agent Skills specification
        run: uvx --from skills-ref==0.1.1 agentskills validate "${{ github.workspace }}"
      - name: Verify skills CLI discovery and isolated install
        env:
          CI: "true"
        run: |
          listing=$(npx --yes skills@1.5.17 add "${{ github.workspace }}" --list)
          printf '%s\n' "$listing"
          printf '%s\n' "$listing" | grep -q "Found 1 skill"
          printf '%s\n' "$listing" | grep -q "animated-sticker-maker"
          isolated_home=$(mktemp -d)
          HOME="$isolated_home" npx --yes skills@1.5.17 add "${{ github.workspace }}" -g -y --agent codex --copy
          installed="$isolated_home/.agents/skills/animated-sticker-maker"
          test -f "$installed/SKILL.md"
          test -f "$installed/references/validation.md"
          test -f "$installed/scripts/package_sticker.py"
          diff -u SKILL.md "$installed/SKILL.md"

  python:
    name: Python ${{ matrix.python }} / Pillow ${{ matrix.pillow }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            pillow: "Pillow>=10,<11"
          - python: "3.11"
            pillow: "Pillow>=11,<12"
          - python: "3.12"
            pillow: "Pillow>=12,<13"
          - python: "3.13"
            pillow: "Pillow>=12,<13"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python -m pip install "${{ matrix.pillow }}" "numpy>=1.24"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
